        - generic [ref=e77]:
          - heading "DoDoShark Cast Iron Hammer Mill Grinder" [level=1] [ref=e78]
          - paragraph [ref=e81]: DoDoShark Hammer Mill Grinder is a mechanical grinding device composed of a high-strength carbon steel housing, alloy hammer blades, wear-resistant liners, and a dynamically balanced rotor, specially designed for the dry Grinding of brittle materials and fibrous materials with medium to low hardness. It is suitable for coarse and fine Grinding of materials such as corn stalks, corn cobs, forage, wood chips, feed pellets, and traditional Chinese medicine raw materials. The particle size can be controlled by changing the screen, typically ranging from 5 to 80 mesh. It is widely used in agriculture, livestock farming, and specific industrial applications. The crusher achieves efficient size reduction through the strong impact, shearing, and grinding action between the high-speed rotating hammer blades and the materials, liners, and screens.
